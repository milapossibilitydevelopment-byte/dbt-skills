<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Skill Cards</title>
<style>
  :root{
    --teal:#0E8A8A;     --teal-bg:#E3F4F4;
    --orange:#D9701E;   --orange-bg:#FCEEDF;
    --purple:#7B5EA7;   --purple-bg:#EFEAF7;
    --green:#3F8F4A;    --green-bg:#E7F3E8;
    --ink:#22262B;
    --paper:#FAF9F6;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    overscroll-behavior-y:none;
  }
  .app{
    display:flex; flex-direction:column;
    height:100vh; max-width:480px; margin:0 auto;
  }
  header{
    padding:14px 18px 10px; text-align:center; flex-shrink:0;
  }
  header h1{
    margin:0; font-size:1.15rem; letter-spacing:.2px;
  }
  header p{
    margin:2px 0 0; font-size:.78rem; color:#6b7280;
  }

  /* module pill nav */
  .modnav{
    display:flex; gap:6px; padding:8px 14px 4px;
    overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch;
  }
  .modnav button{
    border:1.5px solid transparent; background:#eee; color:#555;
    font-size:.72rem; font-weight:600; padding:6px 11px; border-radius:99px;
    white-space:nowrap; flex-shrink:0;
  }
  .modnav button.active{ color:#fff; }
  .modnav button[data-m="mind"].active{ background:var(--teal); }
  .modnav button[data-m="dt"].active{ background:var(--orange); }
  .modnav button[data-m="er"].active{ background:var(--purple); }
  .modnav button[data-m="ie"].active{ background:var(--green); }

  .stage{
    flex:1; position:relative; overflow:hidden;
    padding:10px 0 6px;
  }
  .track{
    display:flex; height:100%;
    transition:transform .32s cubic-bezier(.22,.61,.36,1);
    will-change:transform;
  }
  .slide{
    flex:0 0 100%; display:flex; align-items:center; justify-content:center;
    padding:0 18px;
  }
  .card{
    width:100%; max-width:360px; height:78vh; max-height:560px;
    background:#fff; border-radius:20px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.18), 0 2px 6px rgba(0,0,0,.06);
    border:1.5px solid var(--accent);
  }
  .card .head{
    background:var(--accent); color:#fff; padding:16px 18px 14px;
    position:relative;
  }
  .card .head .tab{
    font-size:.62rem; font-weight:700; letter-spacing:.6px;
    opacity:.85; text-transform:uppercase;
  }
  .card .head h2{ margin:4px 0 0; font-size:1.3rem; }
  .card .tag{
    color:var(--accent); font-style:italic; font-size:.86rem;
    padding:14px 18px 4px;
  }
  .card .steps{
    flex:1; padding:6px 18px 8px; overflow-y:auto;
  }
  .card .steps .step{
    display:flex; gap:9px; padding:7px 0; font-size:.92rem; line-height:1.32;
  }
  .card .steps .step .num{
    flex-shrink:0; width:22px; height:22px; border-radius:50%;
    background:var(--accent-bg); color:var(--accent); font-weight:700; font-size:.74rem;
    display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .card .when{
    background:var(--accent-bg); margin:0; padding:12px 18px 16px;
  }
  .card .when .label{
    font-size:.66rem; font-weight:700; letter-spacing:.5px; color:var(--accent);
  }
  .card .when p{ margin:3px 0 0; font-size:.84rem; }

  .dots{
    display:flex; justify-content:center; gap:6px; padding:4px 0 10px; flex-shrink:0;
  }
  .dots span{
    width:6px; height:6px; border-radius:50%; background:#d8d8d8; transition:.2s;
  }
  .dots span.active{ background:var(--accent); width:16px; border-radius:4px; }

  .nav-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.9);
    box-shadow:0 2px 8px rgba(0,0,0,.15); border:none; font-size:1.1rem; color:var(--ink);
    display:flex; align-items:center; justify-content:center; z-index:5;
  }
  .nav-btn.prev{ left:2px; } .nav-btn.next{ right:2px; }
  @media (min-width:481px){
    .nav-btn{ display:flex; }
  }
  @media (max-width:480px){
    .nav-btn{ display:none; }
  }

  footer{
    text-align:center; font-size:.68rem; color:#9aa0a6; padding:0 0 10px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🧩 My Skill Cards</h1>
    <p>Swipe to flip through &middot; tap a category to jump</p>
  </header>

  <div class="modnav" id="modnav"></div>

  <div class="stage">
    <button class="nav-btn prev" id="prevBtn" aria-label="Previous">‹</button>
    <div class="track" id="track"></div>
    <button class="nav-btn next" id="nextBtn" aria-label="Next">›</button>
  </div>

  <div class="dots" id="dots"></div>
  <footer>Made for practicing skills together 💛</footer>
</div>

<script>
const MODULES = {
  mind: {label:"Be Here Now", accent:"#0E8A8A", bg:"#E3F4F4"},
  dt:   {label:"Tough Moment Skills", accent:"#D9701E", bg:"#FCEEDF"},
  er:   {label:"Feelings Skills", accent:"#7B5EA7", bg:"#EFEAF7"},
  ie:   {label:"Friendship Skills", accent:"#3F8F4A", bg:"#E7F3E8"},
};

const CARDS = [
 {m:"mind", title:"Wise Mind", tag:"Your calm, smart inside voice.",
  steps:["Feeling Mind = all feelings, no facts","Thinking Mind = all facts, no feelings","Wise Mind = both working together!"],
  when:"You have a big choice to make."},
 {m:"mind", title:"5-4-3-2-1 Grounding", tag:"Come back to right now.",
  steps:["5 things you can SEE","4 things you can TOUCH, 3 you can HEAR","2 things you can SMELL, 1 you can TASTE"],
  when:"Worries carry your brain far away."},
 {m:"mind", title:"Feelings Detective", tag:"Notice it. Name it. No judging.",
  steps:["Notice what is happening inside you","Describe just the facts: \"My fists are tight\"","No \"good\" or \"bad\" — just clues"],
  when:"A feeling shows up and you're not sure what it is."},
 {m:"mind", title:"One Thing at a Time", tag:"Give one thing all of you.",
  steps:["Pick ONE thing: eating, playing, homework","Mind jumped away? Gently bring it back","Try it like it's brand new"],
  when:"Your brain feels like a popcorn machine."},

 {m:"dt", title:"STOP", tag:"Freeze before the feeling drives.",
  steps:["S — Stop! Don't move yet","T — Take a step back and breathe","O — Observe: what's really going on?","P — Proceed: go on, carefully"],
  when:"You're about to do something you might regret."},
 {m:"dt", title:"TIPP: Cool the Volcano", tag:"Calm your body down fast.",
  steps:["T — Temperature: cold water on your face","I — Intense exercise: 20 jumping jacks","P — Paced breathing: loooong slow breaths out","P — Push your muscles tight, then let go"],
  when:"Your feelings are at a 10 out of 10."},
 {m:"dt", title:"Soothe with 5 Senses", tag:"Be extra kind to yourself.",
  steps:["SEE something you love, HEAR a favorite song","SMELL something nice, TASTE something yummy","TOUCH something soft, like a cozy blanket"],
  when:"You feel sad, scared, or hurt inside."},
 {m:"dt", title:"Change the Channel", tag:"Give your brain a new show.",
  steps:["DO something: draw, build, run, play","HELP someone else feel good","COUNT backwards from 100 by 5s"],
  when:"You can't fix the problem right now."},

 {m:"er", title:"Name That Feeling", tag:"Name it to tame it.",
  steps:["Where is it in your body? Belly? Chest?","Pick a word: mad, sad, scared, jealous…","Say it: \"I feel ___ because ___\""],
  when:"Something big is bubbling up inside."},
 {m:"er", title:"Check the Facts", tag:"Is your brain telling the whole story?",
  steps:["What happened? Just the facts","What story is my brain adding?","Could there be another explanation?"],
  when:"One thought is making a feeling grow HUGE."},
 {m:"er", title:"Opposite Action", tag:"Do the opposite of the feeling's orders.",
  steps:["Scared (but safe)? Take one brave step","Mad? Speak softly or walk away kindly","Sad? Get up and do one fun thing"],
  when:"The feeling is too big or doesn't fit the facts."},
 {m:"er", title:"Power Up Your Body", tag:"A strong body makes strong feelings easier.",
  steps:["Sleep enough, eat regular meals","Move your body every day","Tell a grown-up when you feel sick"],
  when:"Little things keep turning into big upsets."},

 {m:"ie", title:"DEAR: Ask for What You Need", tag:"Use your words, get heard.",
  steps:["D — Describe what happened, just facts","E — Explain how you feel: \"I feel left out\"","A — Ask clearly for what you want","R — Remember to say thank you"],
  when:"You need something from a friend or grown-up."},
 {m:"ie", title:"GIVE: Be a Good Friend", tag:"Keep your friendships strong.",
  steps:["Gentle — no mean words or faces","Interested — really listen","Validate — \"That makes sense!\"","Easy manner — smile, keep it light"],
  when:"You want to get along and keep a friend."},
 {m:"ie", title:"FAST: Stick Up for You", tag:"Be kind to others AND to yourself.",
  steps:["Be Fair — to them and to YOU","Don't say sorry for having feelings","Stick to what you believe is right","Tell the truth"],
  when:"Someone wants you to do something that feels wrong."},
 {m:"ie", title:"Ride the Wave", tag:"Feelings are like waves: they rise, then fade.",
  steps:["Notice the wave coming: \"Here it is\"","Breathe and let it be there","Wait… every wave goes back down"],
  when:"A big feeling hits and you just need to get through it."},
];

const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
const modnav = document.getElementById('modnav');
let current = 0;

function cardHTML(c, i){
  const mod = MODULES[c.m];
  const steps = c.steps.map((s,idx)=>`<div class="step"><span class="num">${idx+1}</span><span>${s}</span></div>`).join('');
  return `<div class="slide" data-i="${i}" data-m="${c.m}">
    <div class="card" style="--accent:${mod.accent}; --accent-bg:${mod.bg}">
      <div class="head"><div class="tab">${mod.label}</div><h2>${c.title}</h2></div>
      <div class="tag">${c.tag}</div>
      <div class="steps">${steps}</div>
      <div class="when"><div class="label">USE IT WHEN…</div><p>${c.when}</p></div>
    </div>
  </div>`;
}

track.innerHTML = CARDS.map(cardHTML).join('');
dotsEl.innerHTML = CARDS.map((c,i)=>`<span data-i="${i}" style="--accent:${MODULES[c.m].accent}"></span>`).join('');

const modKeys = Object.keys(MODULES);
modnav.innerHTML = `<button data-m="all" class="active">All</button>` +
  modKeys.map(k=>`<button data-m="${k}">${MODULES[k].label}</button>`).join('');

function update(){
  track.style.transform = `translateX(-${current*100}%)`;
  [...dotsEl.children].forEach((d,i)=>d.classList.toggle('active', i===current));
  const m = CARDS[current].m;
  [...modnav.children].forEach(b=>b.classList.toggle('active', b.dataset.m===m));
}

function goTo(i){
  current = Math.max(0, Math.min(CARDS.length-1, i));
  update();
}

document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
dotsEl.addEventListener('click', e=>{
  const i = e.target?.dataset?.i;
  if(i!==undefined) goTo(parseInt(i));
});
modnav.addEventListener('click', e=>{
  const m = e.target?.dataset?.m;
  if(!m) return;
  [...modnav.children].forEach(b=>b.classList.toggle('active', b===e.target));
  if(m==='all'){ goTo(0); return; }
  const idx = CARDS.findIndex(c=>c.m===m);
  if(idx>=0) goTo(idx);
});

// swipe handling
let startX=0, startY=0, dx=0, dragging=false;
track.addEventListener('touchstart', e=>{
  startX=e.touches[0].clientX; startY=e.touches[0].clientY; dragging=true;
  track.style.transition='none';
},{passive:true});
track.addEventListener('touchmove', e=>{
  if(!dragging) return;
  dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if(Math.abs(dx) > Math.abs(dy)){
    track.style.transform = `translateX(calc(-${current*100}% + ${dx}px))`;
  }
},{passive:true});
track.addEventListener('touchend', ()=>{
  dragging=false;
  track.style.transition='transform .32s cubic-bezier(.22,.61,.36,1)';
  if(dx > 60) goTo(current-1);
  else if(dx < -60) goTo(current+1);
  else update();
  dx=0;
});

// keyboard support (desktop)
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') goTo(current-1);
  if(e.key==='ArrowRight') goTo(current+1);
});

update();
</script>
</body>
</html>
